<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>2025年10月上期所行情数据可视化</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      body {
        margin: 2rem auto;
        max-width: 1100px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin: 1.5rem 0;
      }

      .metric-card {
        background: #fff;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        padding: 1rem;
      }

      .metric-card h3 {
        margin: 0;
        font-size: 0.9rem;
        color: #636b74;
      }

      .metric-card p {
        margin: 0.25rem 0 0;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .table-container {
        overflow-x: auto;
        margin-top: 1.5rem;
        background: #fff;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        padding: 1rem;
      }

      table {
        width: 100%;
        min-width: 720px;
      }

      canvas {
        margin: 1.5rem 0;
        background: #fff;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        padding: 1rem;
      }

      #chartStatus {
        color: #d53824;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
  </head>
  <body>
    <header>
      <h1>2025年10月上海期货交易所数据可视化</h1>
      <p>
        基于日周数据接口整理的CSV文件。选择数据集后可动态筛选合约、切换指标并查看概要统计与数据样本。
      </p>
    </header>

    <section class="controls">
      <label>
        <span>数据集</span>
        <select id="datasetSelect"></select>
      </label>
      <label>
        <span id="filterLabel">过滤字段</span>
        <input
          id="filterValue"
          type="text"
          list="filterOptions"
          placeholder="留空表示全部"
        />
        <datalist id="filterOptions"></datalist>
        <small id="filterHelper"></small>
      </label>
      <label>
        <span>数值指标</span>
        <select id="yFieldSelect"></select>
      </label>
      <label>
        <span>图表类型</span>
        <select id="chartTypeSelect">
          <option value="line">折线图</option>
          <option value="bar">柱状图</option>
        </select>
      </label>
    </section>

    <section id="datasetSummary"></section>

    <section class="metrics">
      <div class="metric-card">
        <h3>数据条数</h3>
        <p><span id="metricCount">—</span></p>
      </div>
      <div class="metric-card">
        <h3>最小值</h3>
        <p><span id="metricMin">—</span></p>
      </div>
      <div class="metric-card">
        <h3>最大值</h3>
        <p><span id="metricMax">—</span></p>
      </div>
      <div class="metric-card">
        <h3>平均值</h3>
        <p><span id="metricAvg">—</span></p>
      </div>
    </section>

    <p id="chartStatus"></p>
    <canvas id="dataChart" height="360"></canvas>

    <section class="table-container">
      <div id="tableInfo"></div>
      <table id="dataTable"></table>
    </section>

    <footer>
      <small>
        提示：可视化所用的CSV位于 <code>web/data/structured/</code>。
        如需更新数据，请先执行 <code>python3 scripts/structure_shfe_oct2025.py</code>，
        再刷新本页面。
      </small>
    </footer>

    <script type="module">
      const DATASETS = [
        {
          key: "futures_kx",
          label: "期货｜日交易快讯",
          file: "./data/structured/futures_kx.csv",
          description: "每个期货合约的日度行情（开盘价、收盘价、成交量、持仓量等）。",
          defaultY: "CLOSEPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
        },
        {
          key: "futures_pm",
          label: "期货｜成交持仓排名",
          file: "./data/structured/futures_pm.csv",
          description: "会员及境外特殊参与者的成交量、持买单、持卖单排名。",
          defaultY: "CJ1",
          filterKey: "INSTRUMENTID",
          dateKey: "trade_date",
          forceFilter: true,
        },
        {
          key: "futures_timeprice_default",
          label: "期货｜当前合约加权均价",
          file: "./data/structured/futures_timeprice_default.csv",
          description: "各品种当前合约在不同时间段的加权平均价。",
          defaultY: "REFSETTLEMENTPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
        },
        {
          key: "futures_timeprice_main",
          label: "期货｜主力合约加权均价",
          file: "./data/structured/futures_timeprice_main.csv",
          description: "各品种主力合约在不同时间段的加权平均价。",
          defaultY: "REFSETTLEMENTPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
        },
        {
          key: "futures_timeprice_daily",
          label: "期货｜各合约加权均价",
          file: "./data/structured/futures_timeprice_daily.csv",
          description: "各品种所有合约在指定时段的加权平均价。",
          defaultY: "REFSETTLEMENTPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
          forceFilter: true,
        },
        {
          key: "futures_markerprice",
          label: "期货｜日中交易参考价",
          file: "./data/structured/futures_markerprice.csv",
          description: "交易时段内的参考价及涨跌情况。",
          defaultY: "MARKERPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
        },
        {
          key: "futures_settlement",
          label: "期货｜每日结算参数",
          file: "./data/structured/futures_settlement.csv",
          description: "各期货合约的结算价、手续费率、保证金率等。",
          defaultY: "SETTLEMENTPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
        },
        {
          key: "futures_dailystock",
          label: "期货｜仓单日报",
          file: "./data/structured/futures_dailystock.csv",
          description: "各品种仓单数量、变动及仓库信息。",
          defaultY: "WRTWGHTS",
          filterKey: "VARNAME",
          dateKey: "trade_date",
        },
        {
          key: "futures_dlv_premium",
          label: "期货｜厂库提货地升贴水",
          file: "./data/structured/futures_dlv_premium.csv",
          description: "不同交割地、品牌的升贴水及适用日期。",
          defaultY: "PREMIUM",
          filterKey: "COMMODITYNAME",
          dateKey: "trade_date",
        },
        {
          key: "options_kx",
          label: "期权｜日交易快讯",
          file: "./data/structured/options_kx.csv",
          description: "期权合约的日度行情与希腊值信息。",
          defaultY: "CLOSEPRICE",
          filterKey: "INSTRUMENTID",
          dateKey: "trade_date",
          forceFilter: true,
        },
        {
          key: "options_settlement",
          label: "期权｜每日结算参数",
          file: "./data/structured/options_settlement.csv",
          description: "期权合约的结算价、手续费率和保证金要求。",
          defaultY: "SETTLEMENTPRICE",
          filterKey: "PRODUCTID",
          dateKey: "trade_date",
          forceFilter: true,
        },
      ];

      const datasetSelect = document.querySelector("#datasetSelect");
      const yFieldSelect = document.querySelector("#yFieldSelect");
      const chartTypeSelect = document.querySelector("#chartTypeSelect");
      const filterLabel = document.querySelector("#filterLabel");
      const filterInput = document.querySelector("#filterValue");
      const filterOptions = document.querySelector("#filterOptions");
      const filterHelper = document.querySelector("#filterHelper");
      const datasetSummary = document.querySelector("#datasetSummary");
      const chartStatus = document.querySelector("#chartStatus");
      const metricCount = document.querySelector("#metricCount");
      const metricMin = document.querySelector("#metricMin");
      const metricMax = document.querySelector("#metricMax");
      const metricAvg = document.querySelector("#metricAvg");
      const tableInfo = document.querySelector("#tableInfo");
      const dataTable = document.querySelector("#dataTable");

      let currentChart = null;
      let state = {
        rows: [],
        fields: [],
        meta: null,
      };
      let filterTimer = null;

      function init() {
        DATASETS.forEach((ds) => {
          const option = document.createElement("option");
          option.value = ds.key;
          option.textContent = ds.label;
          datasetSelect.appendChild(option);
        });
        datasetSelect.addEventListener("change", handleDatasetChange);
        yFieldSelect.addEventListener("change", updateVisualization);
        chartTypeSelect.addEventListener("change", updateVisualization);
        filterInput.addEventListener("input", () => {
          clearTimeout(filterTimer);
          filterTimer = setTimeout(updateVisualization, 300);
        });
        handleDatasetChange();
      }

      function handleDatasetChange() {
        const selectedKey = datasetSelect.value || DATASETS[0].key;
        const meta = DATASETS.find((ds) => ds.key === selectedKey);
        if (!meta) return;
        datasetSelect.value = meta.key;
        datasetSummary.textContent = "数据加载中…";
        chartStatus.textContent = "";
        Papa.parse(meta.file, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (result) => processDataset(meta, result),
          error: (err) => {
            datasetSummary.textContent = `加载失败：${err.message}`;
          },
        });
      }

      function processDataset(meta, result) {
        const fields = result.meta.fields || [];
        const rows = (result.data || []).filter((row) =>
          Object.values(row).some(
            (value) => value !== null && String(value).trim() !== ""
          )
        );
        rows.forEach((row) => {
          if (meta.dateKey && row[meta.dateKey]) {
            const iso = toIsoDate(row[meta.dateKey]);
            if (iso) row.__dateLabel = iso;
          }
        });
        state = { rows, fields, meta };

        populateFilter(meta, rows, fields);
        populateNumericFields(meta, rows, fields);
        updateDatasetSummary(meta, rows);
        updateVisualization();
      }

      function populateFilter(meta, rows, fields) {
        filterOptions.innerHTML = "";
        filterInput.value = "";
        filterHelper.textContent = "";

        if (!meta.filterKey || !fields.includes(meta.filterKey)) {
          filterLabel.style.display = "none";
          filterInput.style.display = "none";
          filterHelper.style.display = "none";
          return;
        }

        filterLabel.style.display = "";
        filterInput.style.display = "";
        filterHelper.style.display = "";

        const values = uniqueValues(rows, meta.filterKey, 200);
        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          filterOptions.appendChild(option);
        });
        if (values.length >= 200) {
          filterHelper.textContent = `仅展示前 ${values.length} 个候选值，可手动输入完整合约/品种。`;
        } else {
          filterHelper.textContent = "可输入或选择合约/品种名称，留空表示全部。";
        }

        if (meta.forceFilter && values.length > 0) {
          filterInput.value = values[0];
        }
      }

      function populateNumericFields(meta, rows, fields) {
        yFieldSelect.innerHTML = "";
        const numericFields = fields.filter((field) =>
          rows.some((row) => isFinite(parseFloat(row[field])))
        );
        numericFields.forEach((field) => {
          const option = document.createElement("option");
          option.value = field;
          option.textContent = field;
          yFieldSelect.appendChild(option);
        });

        const defaultY =
          (meta.defaultY && numericFields.includes(meta.defaultY)
            ? meta.defaultY
            : numericFields[0]) || "";
        yFieldSelect.value = defaultY;
      }

      function updateDatasetSummary(meta, rows) {
        datasetSummary.innerHTML = `
          <strong>${meta.label}</strong> ｜ ${meta.description}<br />
          数据总量：${rows.length.toLocaleString()} 条
        `;
      }

      function updateVisualization() {
        if (!state.meta) return;
        const { rows, fields, meta } = state;
        const yField = yFieldSelect.value;
        if (!yField) {
          chartStatus.textContent = "没有可用数值字段。";
          clearChart();
          renderTable([]);
          resetMetrics();
          return;
        }

        const filterKey = meta.filterKey;
        const filterValue = filterKey ? filterInput.value.trim() : "";
        let filteredRows = rows;
        if (filterKey && filterValue) {
          filteredRows = rows.filter(
            (row) => String(row[filterKey]).trim() === filterValue
          );
        }

        metricCount.textContent = filteredRows.length.toLocaleString();
        const chartRows = filteredRows
          .map((row) => ({
            row,
            value: parseFloat(row[yField]),
          }))
          .filter((item) => Number.isFinite(item.value));

        if (meta.dateKey) {
          chartRows.sort((a, b) =>
            String(a.row[meta.dateKey]).localeCompare(b.row[meta.dateKey])
          );
        }

        const values = chartRows.map((item) => item.value);
        if (values.length) {
          metricMin.textContent = formatNumber(Math.min(...values));
          metricMax.textContent = formatNumber(Math.max(...values));
          metricAvg.textContent = formatNumber(
            values.reduce((acc, cur) => acc + cur, 0) / values.length
          );
        } else {
          metricMin.textContent = "—";
          metricMax.textContent = "—";
          metricAvg.textContent = "—";
        }

        if (chartRows.length === 0) {
          chartStatus.textContent =
            "所选指标在当前过滤条件下没有有效数值。";
          clearChart();
        } else if (chartRows.length > 5000) {
          chartStatus.textContent =
            "数据量超过 5,000 条，建议输入合约/品种缩小范围以便绘图。";
          clearChart();
        } else {
          chartStatus.textContent = "";
          const labels = chartRows.map((item, index) => {
            if (meta.dateKey) {
              return item.row.__dateLabel || item.row[meta.dateKey];
            }
            return String(index + 1);
          });
          const chartType = chartTypeSelect.value || "line";
          renderChart(labels, values, chartType, yField);
        }

        renderTable(filteredRows, fields);
      }

      function renderChart(labels, values, chartType, yField) {
        const ctx = document.getElementById("dataChart").getContext("2d");
        if (currentChart) {
          currentChart.destroy();
        }
        currentChart = new Chart(ctx, {
          type: chartType,
          data: {
            labels,
            datasets: [
              {
                label: yField,
                data: values,
                borderColor: "#2563eb",
                backgroundColor:
                  chartType === "line"
                    ? "rgba(37, 99, 235, 0.15)"
                    : "rgba(37, 99, 235, 0.55)",
                borderWidth: 2,
                tension: 0.25,
                pointRadius: 3,
                pointHoverRadius: 5,
              },
            ],
          },
          options: {
            responsive: true,
            interaction: {
              mode: "index",
              intersect: false,
            },
            plugins: {
              legend: {
                display: false,
              },
              tooltip: {
                callbacks: {
                  label(ctx) {
                    const value = ctx.parsed.y;
                    return `${yField}: ${formatNumber(value)}`;
                  },
                },
              },
            },
            scales: {
              y: {
                ticks: {
                  callback: (value) => formatNumber(value),
                },
              },
            },
          },
        });
      }

      function clearChart() {
        if (currentChart) {
          currentChart.destroy();
          currentChart = null;
        }
      }

      function renderTable(rows, fields) {
        const displayRows = (rows || []).slice(0, 50);
        if (displayRows.length === 0) {
          tableInfo.textContent = "无数据样本可展示。";
          dataTable.innerHTML = "";
          return;
        }
        tableInfo.textContent = `预览前 ${displayRows.length} 行（共 ${
          rows.length
        } 行）`;
        const headerHtml = `<thead><tr>${fields
          .map((field) => `<th>${escapeHtml(field)}</th>`)
          .join("")}</tr></thead>`;
        const bodyHtml = displayRows
          .map((row) => {
            const cells = fields
              .map((field) => `<td>${escapeHtml(row[field] ?? "")}</td>`)
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("");
        dataTable.innerHTML = `${headerHtml}<tbody>${bodyHtml}</tbody>`;
      }

      function resetMetrics() {
        metricCount.textContent = "—";
        metricMin.textContent = "—";
        metricMax.textContent = "—";
        metricAvg.textContent = "—";
      }

      function uniqueValues(rows, key, limit) {
        const seen = new Set();
        const values = [];
        for (const row of rows) {
          const value = String(row[key] ?? "").trim();
          if (!value) continue;
          if (!seen.has(value)) {
            seen.add(value);
            values.push(value);
            if (values.length >= limit) break;
          }
        }
        return values;
      }

      function toIsoDate(value) {
        const str = String(value).trim();
        if (!str) return null;
        if (/^\d{8}$/.test(str)) {
          return `${str.slice(0, 4)}-${str.slice(4, 6)}-${str.slice(6)}`;
        }
        return str;
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) return "—";
        const abs = Math.abs(value);
        const digits = abs >= 10000 ? 0 : 2;
        return value.toLocaleString(undefined, {
          maximumFractionDigits: digits,
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      init();
    </script>
  </body>
</html>
